name: Integrate Arc Overhang Enhancements

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  modify-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Git
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'

    - name: Modify PerimeterGenerator.cpp
      run: |
        FILE="src/libslic3r/PerimeterGenerator.cpp"

        # Modify threshold_external calculation safely
        sed -i '/coord_t threshold_external = 0.0;/c\
        const float expand_factor = 1.03f;\
        coord_t threshold_external = 0.0;\
        if (apply_precise_outer_wall) {\
            threshold_external = this->ext_perimeter_flow.scaled_spacing() + (this->perimeter_flow.scaled_spacing() / 2.0);\
        } else {\
            threshold_external = (this->ext_perimeter_flow.scaled_spacing() / 2.0) + (this->perimeter_flow.scaled_spacing() / 2.0);\
        }\
        threshold_external *= expand_factor;' "$FILE"

        # Insert Arc Overhang helper functions before the closing namespace
        awk '/} \/\/ namespace Slic3r/ { \
            print "\n// --- New Helper Functions for Arc Overhangs ---"; \
            print "bool PerimeterGenerator::is_point_supported(const Point& pt, const Polygons& lower_layer) {"; \
            print "    const coord_t tolerance = scale_(0.1);"; \
            print "    Polygon buffer = offset(Polygon({pt}), tolerance)[0];"; \
            print "    return !intersection(buffer, lower_layer).empty();"; \
            print "}"; \
            print "std::vector<Point> PerimeterGenerator::find_supported_starts(const Polygon& perimeter, const Polygons& lower_layer) {"; \
            print "    std::vector<Point> supported_starts;"; \
            print "    for (const Point& pt : perimeter.points) {"; \
            print "        if (this->is_point_supported(pt, lower_layer)) {"; \
            print "            supported_starts.push_back(pt);"; \
            print "        }"; \
            print "    }"; \
            print "    return supported_starts;"; \
            print "}"; \
            print "Polylines PerimeterGenerator::generate_arc_paths(const Polygon& overhang, const std::vector<Point>& start_points) {"; \
            print "    Polylines arc_paths;"; \
            print "    const double arc_step_size = scale_(0.2);"; \
            print "    const double max_radius = scale_(40.0);"; \
            print "    for (const Point& start : start_points) {"; \
            print "        Polyline arc_path;"; \
            print "        arc_path.points.push_back(start);"; \
            print "        double current_offset = arc_step_size;"; \
            print "        while (current_offset <= max_radius) {"; \
            print "            Polygons offset_perimeter = offset(overhang, current_offset);"; \
            print "            if (offset_perimeter.empty()) break;"; \
            print "            Point next_point = offset_perimeter[0].closest_point(start);"; \
            print "            arc_path.points.push_back(next_point);"; \
            print "            current_offset += arc_step_size;"; \
            print "        }"; \
            print "        if (arc_path.points.size() > 1) {"; \
            print "            arc_paths.push_back(arc_path);"; \
            print "        }"; \
            print "    }"; \
            print "    return arc_paths;"; \
            print "}"; \
        }1' "$FILE" > temp && mv temp "$FILE"

        # Modify process() function to add Arc Overhang Handling
        sed -i '/if (this->m_object_config->perimeters.value > 0) {/a\
        // --- Arc Overhang Handling --- \
        if (this->m_print_config->enable_arc_overhangs) { \
            Polygons overhang_perimeters = diff(perimeters_to_process, lower_layer_perimeters); \
            for (const Polygon& overhang : overhang_perimeters) { \
                std::vector<Point> supported_starts = this->find_supported_starts(overhang, lower_layer_perimeters); \
                if (!supported_starts.empty()) { \
                    Polylines arc_paths = this->generate_arc_paths(overhang, supported_starts); \
                    for (const Polyline& path : arc_paths) { \
                        ExtrusionLoop eloop(extrusion_role::erOverhangPerimeter); \
                        eloop.paths.emplace_back( \
                            ExtrusionPath( \
                                extrusion_role::erOverhangPerimeter, \
                                m_mm3_per_mm, \
                                this->m_perimeter_flow->width(), \
                                m_layer_height)); \
                        eloop.paths.back().polyline = path; \
                        m_out.emplace_back(eloop); \
                    } \
                } else { \
                    ExtrusionLoop eloop(extrusion_role::erPerimeter); \
                    eloop.paths.emplace_back( \
                        ExtrusionPath( \
                            extrusion_role::erPerimeter, \
                            m_mm3_per_mm, \
                            this->m_perimeter_flow->width(), \
                            m_layer_height)); \
                    eloop.paths.back().polyline = overhang.polyline(); \
                    m_out.emplace_back(eloop); \
                } \
            } \
        } \
        // --- End Arc Overhang Handling ---' "$FILE"

    - name: Commit and push changes
      uses: EndBug/add-and-commit@v9.1.4
      with:
        message: 'Integrated Arc Overhang Enhancements'
        push: true

    - name: Build and test
      run: |
        mkdir -p build
        cd build
        cmake ..
        make -j$(nproc)
        ctest --output-on-failure
