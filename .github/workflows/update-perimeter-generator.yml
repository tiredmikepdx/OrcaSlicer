name: Build & Test OrcaSlicer with Arc Overhang Enhancements
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Cache Dependencies
        id: cache-dependencies
        uses: actions/cache@v3
        with:
          path: /etc/apt/archives
          key: apt-packages-${{ runner.os }}-${{ hashFiles('apt-packages.txt') }}-${{ github.run_id }}
          restore-keys: apt-packages-${{ runner.os }}

      - name: Log Cache Miss
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: echo "⚠️ Cache not found for apt packages. This run may take longer due to dependency re-installation."

      - name: Validate Workflow YAML Syntax
        run: |
          echo "🔍 Validating workflow YAML syntax..."
          python -c 'import yaml; yaml.safe_load(open(".github/workflows/update-perimeter-generator.yml"))'
          echo "✅ Workflow YAML syntax validated successfully."

      - name: Clear Apt Cache
        run: sudo apt-get clean

      - name: Update Apt Package Lists
        run: |
          set -x # Enable verbose shell tracing
          sudo apt-get update
          set +x # Disable verbose shell tracing
          if [ $? -ne 0 ]; then
            echo "❌ Error updating apt package lists. Please check the apt-get output."
            exit 1
          fi

      - name: Install Base Dependencies (Excluding IlmBase and OpenVDB)
        run: |
          set -x # Enable verbose shell tracing
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            ninja-build \
            libgtk-3-dev \
            libwxgtk3.2-dev \
            libpng-dev \
            libeigen3-dev \
            libglew-dev \
            libglfw3-dev \
            libtbb-dev \
            libboost-all-dev \
            libharfbuzz-dev \
            libcurl4-openssl-dev \
            libgtest-dev \
            libgmock-dev \
            clang-format \
            freeglut3-dev \
            zlib1g-dev \
            libjpeg-dev \
            libtiff-dev \
            libfreetype6-dev \
            libzip-dev \
            gettext \
            git-lfs \
            libcereal-dev
          set +x # Disable verbose shell tracing
          if [ $? -ne 0 ]; then
            echo "❌ Error installing base dependencies (excluding IlmBase and OpenVDB). Please check the apt-get output."
            exit 1
          fi

      - name: Install IlmBase and OpenVDB Separately
        run: |
          set -x # Enable verbose shell tracing
          sudo apt-get install -y libilmbase-dev libopenvdb-dev
          set +x # Disable verbose shell tracing
          if [ $? -ne 0 ]; then
            echo "❌ Error installing IlmBase and OpenVDB. Please check the apt-get output."
            exit 1
          fi

      - name: Download and Build NLopt from Source
        run: |
          mkdir nlopt-build
          cd nlopt-build
          wget https://github.com/stevengj/nlopt/archive/v2.7.1.tar.gz
          tar xzf v2.7.1.tar.gz
          cd nlopt-2.7.1
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)
          sudo make install

      - name: Verify NLopt Installation (Build from Source)
        run: |
          if test -f /usr/local/include/nlopt.hpp; then
            echo "✅ NLopt header found in /usr/local/include"
          else
            echo "❌ NLopt header NOT found in /usr/local/include"
            exit 1
          fi
          if test -f /usr/local/lib/libnlopt.so; then
            echo "✅ NLopt library found in /usr/local/lib"
          else
            echo "❌ NLopt library NOT found in /usr/local/lib"
            exit 1
          fi

      - name: Check IlmBase Installation Path
        run: |
          dpkg -L libilmbase-dev

      - name: Modify CMake Configuration - Set PREFIX_PATH and IlmBase_DIR (Environment Variables)
        run: |
          echo "CMAKE_PREFIX_PATH=/usr/local;/usr;/opt;/usr/lib;/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "IlmBase_DIR=/usr/lib/cmake/IlmBase-2.5" >> $GITHUB_ENV

      - name: Clear CMake Cache
        run: |
          rm -rf build

      - name: Cache CMake Build
        uses: actions/cache@v3
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ github.sha }}-nlopt-build-dir-fix-yaml-validation-openvdb-apt-nlopt-source-ilmbase-separate-install-attempt19 # Attempt 19 key
          restore-keys: |
            cmake-build-${{ runner.os }}-nlopt-build-dir-fix-yaml-validation-openvdb-apt-nlopt-source-ilmbase-separate-install-attempt19

      - name: Configure CMake - Explicit Paths and Arguments
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_ARC_OVERHANG=ON \
            -DUSE_GUI=ON \
            -DENABLE_MULTITHREADING=ON \
            -DENABLE_LOGGING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DOPENVDB_FIND_MODULE_PATH=/usr/share/OpenVDB \
            -DIlmBase_DIR=/usr/lib/cmake/IlmBase-2.5 \
            -DCMAKE_PREFIX_PATH=/usr/local;/usr;/opt;/usr/lib;/usr/lib/x86_64-linux-gnu \
            -Wdev -Werror=dev

      - name: Build Project
        run: |
          cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify Code Formatting
        run: |
          clang-format --dry-run --Werror $(find . -name '*.cpp' -o -name '*.h')

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer-Build-Attempt19
          path: build/bin/

      - name: Cleanup Unused Dependencies
        if: always()
        run: sudo apt-get clean
