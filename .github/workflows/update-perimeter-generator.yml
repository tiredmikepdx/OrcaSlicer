name: Build & Test OrcaSlicer with Arc Overhang Enhancements

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Cache Dependencies
        id: cache-dependencies
        uses: actions/cache@v3
        with:
          path: /etc/apt/archives
          key: apt-packages-${{ runner.os }}-${{ hashFiles('apt-packages.txt') }}
          restore-keys: apt-packages-${{ runner.os }}-

      - name: Log Cache Miss
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: echo "⚠️ Cache not found for apt packages. This run may take longer due to dependency re-installation."

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            ninja-build \
            libgtk-3-dev \
            libwxgtk3.2-dev \
            libpng-dev \
            libeigen3-dev \
            libglew-dev \
            libglfw3-dev \
            libtbb-dev \
            libboost-all-dev \
            libharfbuzz-dev \
            libcurl4-openssl-dev \
            libgtest-dev \
            libgmock-dev \
            clang-format \
            freeglut3-dev \
            zlib1g-dev \
            libjpeg-dev \
            libtiff-dev \
            libfreetype6-dev \
            libzip-dev \
            gettext \
            git-lfs \
            libcereal-dev

      - name: Debug: List GUI Directory # Debugging Step
        run: |
          pwd
          ls -l src/slic3r/GUI/

      - name: Modify GUI ConfigWizard.cpp (GUI Option) # Using separate script file
        run: |
          GUI_FILE="src/slic3r/GUI/ConfigWizard.cpp"

          # Create a separate script file to perform the sed command
          echo '#!/bin/bash' > modify_gui_config.sh
          echo "if ! grep -q 'arc_overhang' \"\$GUI_FILE\"; then" >> modify_gui_config.sh
          echo "  echo 'Adding GUI option for Arc Overhang...'" >> modify_gui_config.sh
          echo "  sed -i '/add_option(\"enable_arc_overhang\",/c\\\\" >> modify_gui_config.sh
          echo "            add_option(\"enable_arc_overhang\", _(\"Enable Arc Overhang\"), \"\", false);' \"\$GUI_FILE\"" >> modify_gui_config.sh
          echo "fi" >> modify_gui_config.sh
          chmod +x modify_gui_config.sh

          # Execute the separate script
          ./modify_gui_config.sh

      - name: Cache CMake Build
        uses: actions/cache@v3
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            cmake-build-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_ARC_OVERHANG=ON \
            -DUSE_GUI=ON \
            -DENABLE_MULTITHREADING=ON \
            -DENABLE_LOGGING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_INCLUDE_PATH=/usr/include

      - name: Build Project
        run: |
          cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify Code Formatting
        run: |
          clang-format --dry-run --Werror $(find . -name '*.cpp' -o -name '*.h')

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer-Build
          path: build/bin/

      - name: Cleanup Unused Dependencies
        if: always()
        run: sudo apt-get clean
