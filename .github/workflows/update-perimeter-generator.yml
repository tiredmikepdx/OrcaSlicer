name: Build & Test OrcaSlicer with Arc Overhang Enhancements

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Cache Dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: /etc/apt/archives
          key: "apt-packages-${{ runner.os }}-${{ hashFiles('apt-packages.txt') }}" # Enclosed key in double quotes
          restore-keys: apt-packages-${{ runner.os }}-

      - name: Log Cache Miss
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: echo "⚠️ Cache not found for apt packages. This run may take longer due to dependency re-installation."

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            ninja-build \
            libgtk-3-dev \
            libwxgtk3.2-dev \
            libpng-dev \
            libeigen3-dev \
            libglew-dev \
            libglfw3-dev \
            libtbb-dev \
            libboost-all-dev \
            libharfbuzz-dev \
            libcurl4-openssl-dev \
            libgtest-dev \
            libgmock-dev \
            clang-format \
            freeglut3-dev \
            zlib1g-dev \
            libjpeg-dev \
            libtiff-dev \
            libfreetype6-dev \
            libzip-dev \
            gettext \
            git-lfs \
            libcereal-dev

      - name: SimpleDebugStep # Simplified Debugging Step
        run: pwd # Added back the pwd command

      - name: Modify GUI ConfigWizard.cpp (GUI Option) # Using simplified sed command
        run: |
          GUI_FILE="src/slic3r/GUI/ConfigWizard.cpp"

          # Create a separate script file to perform the sed command
          echo '#!/bin/bash' > modify_gui_config.sh
          echo "echo 'Running simplified sed command...'" >> modify_gui_config.sh # Debugging output
          echo "sed -i 's/option/OPTION/g' \"\$GUI_FILE\"" >> modify_gui_config.sh # Simplified sed command
          chmod +x modify_gui_config.sh

          # Execute the separate script
          ./modify_gui_config.sh


      - name: Modify PerimeterGenerator.cpp (Arc Overhang Logic & Threshold)
        run: |
          FILE_PG="src/libslic3r/PerimeterGenerator.cpp"

          # Modify threshold_external calculation using 'r' for replace
          sed -i 's|coord_t threshold_external = 0.0;|const float expand_factor = 1.03f;\\ncoord_t threshold_external = 0.0;\\nif (apply_precise_outer_wall) {\\n    threshold_external = this->ext_perimeter_flow.scaled_spacing() + (this->perimeter_flow.scaled_spacing() / 2.0);\\n} else {\\n    threshold_external = (this->ext_perimeter_flow.scaled_spacing() / 2.0) + (this->perimeter_flow.scaled_spacing() / 2.0);\\n}\\nthreshold_external *= expand_factor;|g' "$FILE_PG"

          - name: Modify GCode.cpp (Arc Overhang Support in extrude_loop)
        run: |
          FILE_GC="src/libslic3r/GCode.cpp"
          # Integrate Arc Overhang settings into extrude_loop in GCode.cpp
          sed -i '/\/\/ --- Original Extrusion Logic ---/i \
          \n    bool is_arc_overhang = (loop.role() == erOverhangPerimeter && m_config->enable_arc_overhangs.value); \
          if (is_arc_overhang) { \
              int original_temp = m_writer.get_temperature(); \
              int original_fan = m_last_fan_speed; \
              double original_speed = m_current_speed; \
          \n        gcode += this->set_temperature(m_config->arc_overhang_temperature.value, false, m_writer.extruder()->id()); \
              gcode += this->set_fan(m_config->arc_overhang_fan_speed.value, true); \
              double arc_speed = m_config->arc_overhang_speed.value * 60; // mm/s to mm/min \
          \n        // Move to start point \
              Point start = loop_copy.polyline.points.front(); \
              gcode += this->travel_to_xy(Vec2d(unscale<double>(start.x), unscale<double>(start.y)), "move to start of arc overhang", m_config->travel_speed.value * 60); \
          \n        // Precise extrusion \
              double path_length_3d = unscale<double>(loop_copy.polyline.length()); \
              double e_per_mm = loop_copy.paths.front().mm3_per_mm / (loop_copy.paths.front().width * loop_copy.paths.front().height); \
              double total_e = 0.0; \
              Point last = start; \
          \n        for (size_t i = 1; i < loop_copy.polyline.points.size(); ++i) { \
                  Point current = loop_copy.polyline.points[i]; \
                  double segment_length = last.distance_to(current) * SCALING_FACTOR; \
                  total_e += segment_length * e_per_mm; \
                  gcode += this->_extrude_to_xy( \
                      Vec2d(unscale<double>(current.x), unscale<double>(current.y)), \
                      total_e, \
                      arc_speed, \
                      description); \
                  last = current; \
              } \
          \n        // Restore settings \
              gcode += this->set_temperature(original_temp, false, m_writer.extruder()->id()); \
              gcode += this->set_fan(original_fan, true); \
              m_current_speed = original_speed; \
          } else {' "$FILE_GC"

      - name: Modify PrintConfig.cpp (GUI Settings)
        run: |
          FILE_PC="src/libslic3r/PrintConfig.cpp"
          # Add Arc Overhang settings to init_common_params in PrintConfig.cpp
          sed -i '/\/\/ \[Rest of the configuration settings...\]/i \
          \n    // --- Begin Arc Overhang Settings --- \
          ConfigOptionDef* def = this->add("enable_arc_overhangs", coBool); \
          def->label = "Enable Arc Overhangs"; \
          def->category = "Arc Overhangs"; \
          def->tooltip = "Enable printing overhangs with expanding arcs to reduce support material."; \
          def->default_value = new ConfigOptionBool(false); \
          \n    def = this->add("arc_overhang_temperature", coInt); \
          def->label = "Arc Overhang Temperature"; \
          def->category = "Arc Overhangs"; \
          def->tooltip = "Temperature for arc overhangs (degrees C). Lower values reduce warping."; \
          def->min = 0; \
          def->default_value = new ConfigOptionInt(195); \
          \n    def = this->add("arc_overhang_fan_speed", coInt); \
          def->label = "Arc Overhang Fan Speed"; \
          def->category = "Arc Overhangs"; \
          def->tooltip = "Fan speed for arc overhangs (0-255). Higher speeds improve cooling."; \
          def->min = 0; \
          def->max = 255; \
          def->default_value = new ConfigOptionInt(255); \
          \n    def = this->add("arc_overhang_speed", coFloat); \
          def->label = "Arc Overhang Speed"; \
          def->category = "Arc Overhangs"; \
          def->tooltip = "Speed for arc overhangs (mm/s). Slower speeds enhance precision."; \
          def->min = 0; \
          def->default_value = new ConfigOptionFloat(5.0); \
          \n    // --- End Arc Overhang Settings ---' "$FILE_PC"

      - name: Modify GUI ConfigWizard.cpp (GUI Option) # Redundant step - will be removed later
        run: |
          GUI_FILE="src/slic3r/GUI/ConfigWizard.cpp"

          # Create a separate script file to perform the sed command
          echo '#!/bin/bash' > modify_gui_config.sh
          echo "if ! grep -q 'arc_overhang' \"\$GUI_FILE\"; then" >> modify_gui_config.sh
          echo "  echo 'Adding GUI option for Arc Overhang...'" >> modify_gui_config.sh
          echo '  sed -i "/add_option(\\\"enable_arc_overhang\\\",/c\\\\" ' >> modify_gui_config.sh
          echo '            add_option(\"enable_arc_overhang\", _(\"Enable Arc Overhang\"), \"\", false);\' "\$GUI_FILE"' >> modify_gui_config.sh
          echo "fi" >> modify_gui_config.sh
          chmod +x modify_gui_config.sh

          # Execute the separate script
          ./modify_gui_config.sh


      - name: Cache CMake Build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            cmake-build-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_ARC_OVERHANG=ON \
            -DUSE_GUI=ON \
            -DENABLE_MULTITHREADING=ON \
            -DENABLE_LOGGING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_INCLUDE_PATH=/usr/include

      - name: Build Project
        run: |
          cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify Code Formatting
        run: |
          clang-format --dry-run --Werror $(find . -name '*.cpp' -o -name '*.h')

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer-Build
          path: build/bin/

      - name: Cleanup Unused Dependencies
        if: always()
        run: sudo apt-get clean
