name: Build & Test OrcaSlicer with Arc Overhang Enhancements
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Cache Dependencies
        id: cache-dependencies
        uses: actions/cache@v3
        with:
          path: /etc/apt/archives
          # Force cache invalidation by adding a timestamp to the key
          key: apt-packages-<span class="math-inline">\{\{ runner\.os \}\}\-</span>{{ hashFiles('apt-packages.txt') }}-<span class="math-inline">\{\{ github\.run\_id \}\}
restore\-keys\: apt\-packages\-</span>{{ runner.os }}-

      - name: Log Cache Miss
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: echo "⚠️ Cache not found for apt packages. This run may take longer due to dependency re-installation."

      - name: Install Base Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            ninja-build \
            libgtk-3-dev \
            libwxgtk3.2-dev \
            libpng-dev \
            libeigen3-dev \
            libglew-dev \
            libglfw3-dev \
            libtbb-dev \
            libboost-all-dev \
            libharfbuzz-dev \
            libcurl4-openssl-dev \
            libgtest-dev \
            libgmock-dev \
            clang-format \
            freeglut3-dev \
            zlib1g-dev \
            libjpeg-dev \
            libtiff-dev \
            libfreetype6-dev \
            libzip-dev \
            gettext \
            git-lfs \
            libcereal-dev

      - name: Download and Build NLopt from Source
        run: |
          mkdir nlopt-build
          cd nlopt-build
          wget https://github.com/stevengj/nlopt/archive/v2.7.1.tar.gz # Get NLopt source
          tar xzf v2.7.1.tar.gz
          cd nlopt-2.7.1
          mkdir build
          cd build
          cmake ..
          make install # Install NLopt to /usr/local/ by default

      - name: Verify NLopt Installation (Build from Source)
        run: |
          if test -f /usr/local/include/nlopt.hpp; then
            echo "✅ NLopt header found in /usr/local/include"
          else
            echo "❌ NLopt header NOT found in /usr/local/include"
            exit 1
          fi
          if test -f /usr/local/lib/libnlopt.so; then
            echo "✅ NLopt library found in /usr/local/lib"
          else
            echo "❌ NLopt library NOT found in /usr/local/lib"
            exit 1
          fi

      - name: Modify CMake Configuration to Find NLopt in /usr/local
        run: |
          echo "CMAKE_PREFIX_PATH=/usr/local" >> <span class="math-inline">GITHUB\_ENV \# Add /usr/local to CMake search path
\- name\: Clear CMake Cache
run\: \|
rm \-rf build
\- name\: Cache CMake Build
uses\: actions/cache@v3
with\:
path\: build
key\: cmake\-build\-</span>{{ runner.os }}-<span class="math-inline">\{\{ github\.sha \}\}\-nlopt\-source
restore\-keys\: \|
cmake\-build\-</span>{{ runner.os }}-nlopt-source

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_ARC_OVERHANG=ON \
            -DUSE_GUI=ON \
            -DENABLE_MULTITHREADING=ON \
            -DENABLE_LOGGING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build Project
        run: |
          cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify Code Formatting
        run: |
          clang-format --dry-run --Werror $(find . -name '*.cpp' -o -name '*.h')

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrcaSlicer-Build
          path: build/bin/

      - name: Cleanup Unused Dependencies
        if: always()
        run: sudo apt-get clean
